<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 170" fill="none">
  <!-- Background card -->
  <rect width="580" height="170" rx="16" fill="#0A1728"/>

  <!-- ── K lettermark ── -->

  <!-- Back K — steel / muted blue -->
  <!-- vertical spine -->
  <rect x="44" y="26" width="12" height="112" rx="3.5" fill="#6E8FAE"/>
  <!-- upper arm -->
  <line x1="50" y1="82" x2="116" y2="26" stroke="#6E8FAE" stroke-width="12" stroke-linecap="round"/>
  <!-- lower arm -->
  <line x1="50" y1="82" x2="116" y2="138" stroke="#6E8FAE" stroke-width="12" stroke-linecap="round"/>
  <!-- semicircle arc at base -->
  <path d="M 32 148 A 52 52 0 0 1 136 148" stroke="#6E8FAE" stroke-width="9" stroke-linecap="round"/>

  <!-- Front K — bright cornflower blue, offset up-right -->
  <!-- vertical spine -->
  <rect x="57" y="16" width="12" height="112" rx="3.5" fill="#4B9EE8"/>
  <!-- upper arm -->
  <line x1="63" y1="72" x2="129" y2="16" stroke="#4B9EE8" stroke-width="12" stroke-linecap="round"/>
  <!-- lower arm -->
  <line x1="63" y1="72" x2="129" y2="128" stroke="#4B9EE8" stroke-width="12" stroke-linecap="round"/>

  <!-- ── Text ── -->

  <!-- "krest logic" on one line -->
  <text font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="300">
    <tspan x="160" y="96" fill="white">krest </tspan><tspan fill="#4B9EE8">logic</tspan>
  </text>

  <!-- separator line -->
  <line x1="160" y1="110" x2="534" y2="110" stroke="#4B9EE8" stroke-width="1.4" opacity="0.65"/>

  <!-- "SYSTEMS" label -->
  <text x="163" y="136"
        font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="400" letter-spacing="7.5" fill="#4B9EE8">SYSTEMS</text>
</svg>
